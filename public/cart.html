<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flash — Корзина</title>
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/cart.css" />
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <div class="logo">
                <span>🌸</span>
                <h1>Flash</h1>
            </div>
            <nav class="nav">
                <a href="/" class="nav-link">Каталог</a>
                <a href="/cart.html" class="nav-link active">Корзина</a>
                <button id="logoutBtn" class="btn btn-secondary" style="padding:6px 16px;">Выйти</button>
            </nav>
        </div>
    </header>

    <main class="container main">
        <h2 class="page-title">🛒 Ваша корзина</h2>
        <div id="cartContainer">
            <div id="cartItems" class="cart-items"></div>
            <div class="cart-summary">
                <div class="total">Итого: <span id="totalPrice">0</span> $</div>
                <div class="cart-actions">
                    <a href="/" class="btn btn-secondary">Продолжить покупки</a>
                    <button id="clearCartBtn" class="btn btn-secondary">Очистить корзину</button>
                </div>
            </div>
        </div>
        <div id="emptyCart" style="display:none; color:var(--text-muted); text-align:center; padding:60px 0;">
            <span style="font-size:3rem;">🌸</span>
            <p style="margin-top:12px;">Корзина пуста. <a href="/">Перейти в каталог</a></p>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>🌸 Flash — твой мир стиля и скорости. Сделано с любовью <span>❤</span></p>
        </div>
    </footer>

    <script src="/js/cart.js"></script>
</body>
</html>
