<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flash — Каталог</title>
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/index.css" />
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <div class="logo">
                <span>🌸</span>
                <h1>Flash</h1>
            </div>
            <nav class="nav">
                <a href="/" class="nav-link active">Каталог</a>
                <a href="/cart.html" class="nav-link">Корзина</a>
                <button id="logoutBtn" class="btn btn-secondary" style="padding:6px 16px;">Выйти</button>
            </nav>
        </div>
    </header>

    <main class="container main">
        <div class="page-header">
            <h2 class="page-title">🔥 Все товары</h2>
            <!-- Декоративные фильтры (только визуал) -->
            <div class="filters">
                <button class="filter-btn active">Все</button>
                <button class="filter-btn">Новинки</button>
                <button class="filter-btn">Хиты</button>
                <button class="filter-btn">Скидки</button>
            </div>
        </div>
        <div id="productList" class="product-grid">
            <!-- Товары будут загружены через JS -->
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>🌸 Flash — твой мир стиля и скорости. Сделано с любовью <span>❤</span></p>
        </div>
    </footer>

    <script src="/js/index.js"></script>
</body>
</html>
