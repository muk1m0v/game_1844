<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flash — Вход</title>
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card fade-in">
            <div class="auth-brand">
                <span class="brand-icon">🌸</span>
                <h1>Flash</h1>
            </div>
            <h2 class="auth-title">Добро пожаловать</h2>
            <p class="auth-subtitle">Войдите в свой аккаунт</p>

            <form id="loginForm" class="auth-form" autocomplete="off">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <div class="input-wrapper">
                        <span class="icon">👤</span>
                        <input type="text" id="username" placeholder="Введите имя" required />
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="input-wrapper">
                        <span class="icon">🔒</span>
                        <input type="password" id="password" placeholder="Введите пароль" required />
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Войти</button>
            </form>

            <div id="loginMessage" class="auth-message"></div>

            <p class="auth-switch">
                Нет аккаунта? <a href="/register.html">Зарегистрироваться</a>
            </p>
        </div>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
